<section class="container" style="padding:80px 0;">
  <h2>Proyectos</h2>

  <!-- FILTROS -->
  <div class="filters">
    <button onclick="filter('all')">Todos</button>
    <button onclick="filter('branding')">Branding</button>
    <button onclick="filter('ads')">Ads</button>
    <button onclick="filter('social')">Social Media</button>
  </div>

  <!-- PROYECTOS -->
  <div class="grid">
    <div class="card project branding">Proyecto Branding 1</div>
    <div class="card project ads">Campaña Ads</div>
    <div class="card project social">Instagram Growth</div>
  </div>
</section>

<script>
function filter(category) {
  const items = document.querySelectorAll('.project');

  items.forEach(item => {
    if (category === 'all' || item.classList.contains(category)) {
      item.style.display = 'block';
    } else {
      item.style.display = 'none';
    }
  });
}
</script>
